<style>
  :root{

  .langbar button{
    font-family:'Poppins'; font-weight:700; font-size:13px; cursor:pointer;
    color:var(--text); background:var(--card); border:1px solid var(--border);
    padding:6px 0; border-radius:99px; transition:all .15s;
    flex:1; text-align:center; min-width:0;
  }
  .langbar button:hover{ border-color:var(--brand); color:#fff; }
  .langbar button.active{ background:var(--brand); border-color:var(--brand); color:#fff; }

  h1{ font-family:'Poppins'; font-weight:800; font-size:30px; color:#fff;
    margin:22px 0 6px; line-height:1.15; }
  .intro{ color:var(--text); opacity:.92; margin-bottom:10px; }
  .testnet{ display:inline-block; background:rgba(180,155,255,.14); color:var(--lav);

  section{ background:var(--bg2); border:1px solid var(--border); border-radius:16px;
    padding:22px 22px; margin-bottom:16px; }

  section h2 .n{ flex:none; width:30px; height:30px; border-radius:50%;
    background:var(--brand); color:#fff; font-size:15px;
    display:flex; align-items:center; justify-content:center; }
  section p{ color:var(--text); opacity:.92; margin-bottom:8px; }
  section ul{ margin:6px 0 4px; padding-inline-start:22px; }
  section li{ margin-bottom:6px; color:var(--text); opacity:.92; }
  .warn{ border-color:var(--brand); background:rgba(242,98,46,.08); }
  .warn h2 .n{ background:var(--brand); }
  strong,b{ color:#fff; }
  .lav{ color:var(--lav); font-weight:600; }
  .brandtxt{ color:var(--brand); font-weight:600; }

  .steps{ list-style:none; padding:0; }
  .steps li{ display:flex; gap:12px; align-items:flex-start; margin-bottom:10px; }
  .steps .dot{ flex:none; margin-top:7px; width:8px; height:8px; border-radius:50%; background:var(--brand); }
  body[dir="rtl"] section ul{ padding-inline-start:22px; }

  .flow .row{ display:flex; gap:12px; align-items:baseline; padding:8px 0; border-bottom:1px solid var(--border); }

  .flow .st{ font-family:'Poppins'; font-weight:600; color:var(--lav); flex:none; min-width:120px; }

  footer{ text-align:center; color:var(--muted); font-size:13px; margin-top:28px; }
  footer a{ color:var(--brand); text-decoration:none; }
  a.mail{ color:var(--brand); text-decoration:none; font-weight:600; }

function setLang(code){
  const d = T[code];
  document.documentElement.lang = code;
  document.documentElement.dir = d.dir;
  document.body.dir = d.dir;
  document.getElementById('tagline').textContent = d.tagline;
  document.getElementById('title').textContent = d.title;
  document.getElementById('intro').textContent = d.intro;
  document.getElementById('testnet').textContent = d.testnet;

  const c = document.getElementById('content');
  c.innerHTML = d.sections.map((s, i) => `
    <section class="${s.warn ? 'warn' : ''}">
      <h2><span class="n">${s.warn ? '⚠️' : (i)}</span> ${s.h}</h2>
      ${s.html}
    </section>`).join('');

  document.getElementById('footer').innerHTML = d.footer;

  document.querySelectorAll('.langbar button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === code));
}

setLang('en');
</script>
